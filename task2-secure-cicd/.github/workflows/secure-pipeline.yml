name: Secure CI/CD Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

permissions:
  contents: read
  security-events: write

jobs:

  semgrep:

    name: Semgrep SAST

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Run Semgrep

        uses: returntocorp/semgrep-action@v1

        with:
          config: p/security-audit

  build:

    name: Docker Build

    needs: semgrep

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build Image

        run: |

          docker build \
            -t ledger-api:latest \
            ./app
