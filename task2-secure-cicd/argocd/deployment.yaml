apiVersion: apps/v1
kind: Deployment

metadata:
  name: ledger-api
  namespace: payments
  labels:
    app: ledger-api

spec:
  replicas: 2

  selector:
    matchLabels:
      app: ledger-api

  template:
    metadata:
      labels:
        app: ledger-api

    spec:
      serviceAccountName: ledger-api-sa

      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001

      containers:
      - name: ledger-api

        image: ghcr.io/premchandkakke/ledger-api:latest

        imagePullPolicy: Always

        ports:
        - containerPort: 8080

        env:
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: ledger-api-secret
              key: DB_PASSWORD

        - name: STRIPE_API_KEY
          valueFrom:
            secretKeyRef:
              name: ledger-api-secret
              key: STRIPE_API_KEY

        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          readOnlyRootFilesystem: true

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"

        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10

        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
