apiVersion: apps/v1
kind: Deployment
metadata:
  name: ledger-api
  namespace: payments
  labels:
    app: ledger-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ledger-api
  template:
    metadata:
      labels:
        app: ledger-api
    spec:
      serviceAccountName: ledger-api-sa
      automountServiceAccountToken: false

      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault

      containers:
      - name: ledger-api
        image: ledger-api:v2
        imagePullPolicy: Never

        ports:
        - containerPort: 8080

        env:
        - name: STRIPE_API_KEY
          valueFrom:
            secretKeyRef:
              name: ledger-api-secret
              key: STRIPE_API_KEY
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: ledger-api-secret
              key: DB_PASSWORD

        - name: APP_NAME
          valueFrom:
            configMapKeyRef:
              name: ledger-api-config
              key: APP_NAME

        - name: APP_ENV
          valueFrom:
            configMapKeyRef:
              name: ledger-api-config
              key: APP_ENV

        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL

        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi

        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10

        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 20

        volumeMounts:
        - mountPath: /tmp
          name: tmp

      volumes:
      - name: tmp
        emptyDir: {}
